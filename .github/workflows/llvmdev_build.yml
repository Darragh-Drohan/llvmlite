name: llvmdev

on:
  pull_request:
    paths:
      - .github/workflows/llvmdev_build.yml
      - buildscripts/github/llvmdev_evaluate.py
      - conda-recipes/llvmdev/**
      - conda-recipes/llvmdev_for_wheel/**
  label:
    types: [created]
  workflow_dispatch:
    inputs:
      platform:
        description: Conda Platform
        default: all
        required: true
        type: choice
        options:
          - all
          - linux-64
          - linux-aarch64
          - linux-s390x
          - osx-64
          - osx-arm64
          - win-64
      recipe:
        description: Recipe to build
        default: all
        required: true
        type: choice
        options:
          - all
          - llvmdev
          - llvmdev_for_wheel
      run_stage:
        description: Run stage
        default: start
        required: true
        type: choice
        options:
          - start
          - continue
          - end

concurrency:
  # Concurrency group that uses the workflow name and PR number if available
  # or commit SHA as a fallback. If a new build is triggered under that
  # concurrency group while a previous build is running it will be canceled.
  # Repeated pushes to a PR will cancel all previous builds, while multiple
  # merges to master will not cancel.
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number
      || toJson(github.event.inputs)
      || github.event.label.name
      || github.sha }}
  cancel-in-progress: true

env:
  ARTIFACT_RETENTION_DAYS: 7

jobs:
  evaluate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix-eval.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Evaluate matrix
        id: matrix-eval
        run: |
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          python ./buildscripts/github/llvmdev_evaluate.py \
            --event-name workflow_dispatch \
            --platform ${{ github.event.inputs.platform }} \
            --recipe ${{ github.event.inputs.recipe }} \
            --run-stage ${{ github.event.inputs.run_stage }} \
            >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build:
    needs: evaluate-matrix
    runs-on: ${{ matrix.platform == 'linux-s390x' && 'ubuntu-24.04-s390x' || matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.evaluate-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Print Matrix
        run: echo "Matrix content: ${{ toJson(matrix) }}"

      - name: Setup build environment
        run: |
          # Use this to make the llvmdev packages that are manylinux compatible
          SRCDIR=$( cd "$(dirname $0)/../.." && pwd )
          echo "SRCDIR=$SRCDIR" >> $GITHUB_ENV
          
          echo "MINICONDA_FILE=https://repo.anaconda.com/miniconda/Miniconda3-py311_24.9.2-0-Linux-s390x.sh" >> $GITHUB_ENV
          echo "CONTAINER_NAME=llvm20-s390x" >> $GITHUB_ENV
          
      - name: Run build script - s390x start stage
        if: ${{ matrix.platform == 'linux-s390x' && github.event.inputs.run_stage == 'start' }}
        run: |
          podman run --rm -it -v $SRCDIR:/root/llvmlite quay.io/pypa/manylinux2014_s390x:latest /root/llvmlite/buildscripts/manylinux/build_llvmdev_start.sh $MINICONDA_FILE start

      - name: Run build script - s390x continue stage
        if: ${{ matrix.platform == 'linux-s390x' && github.event.inputs.run_stage == 'continue' }}
        run: |
          podman run --rm -it -v $SRCDIR:/root/llvmlite quay.io/pypa/manylinux2014_s390x:latest /root/llvmlite/buildscripts/manylinux/build_llvmdev_continue.sh $MINICONDA_FILE continue

      - name: Run build script - s390x end stage
        if: ${{ matrix.platform == 'linux-s390x' && github.event.inputs.run_stage == 'end' }}
        run: |
          podman run --rm -it -v $SRCDIR:/root/llvmlite quay.io/pypa/manylinux2014_s390x:latest /root/llvmlite/buildscripts/manylinux/build_llvmdev_end.sh $MINICONDA_FILE end

      - name: Build and test conda package
        if: ${{ (matrix.platform != 'linux-s390x') }}
        run: |
          # This step can be for all other platforms
          echo "Running build for other platforms"
          # Your existing build logic here

      - name: Upload conda package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.recipe }}_${{ matrix.platform }}
          path: ./docker_output/*/*.conda
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

